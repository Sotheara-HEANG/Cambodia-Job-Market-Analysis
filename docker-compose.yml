services:
  postgres:
    image: postgres:16-alpine
    container_name: job_market_postgres
    environment:
      POSTGRES_DB: cambodia_job_market_analysis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cambodia_job_market_analysis"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
